{% extends "base.html" %}
{% block content %}
<a id="backlink" href="/">back</a>

<h1>New Snippie</h1>

<div class="new-snippie-container">
    <h1>Create new snippie</h1>
    <form action="/api/new" method="POST">
        <label for="title">Title</label>
        <input type="text" name="title" required />

        <label for="contents">Contents</label>
        <textarea name="contents" rows="4" autocomplete="off" required wrap="soft"></textarea>

        <button type="submit">Save</button>
    </form>
</div>
{% endblock content %}
