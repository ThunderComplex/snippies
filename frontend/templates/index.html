{% extends "base.html" %}
{% block content %}
<h1>Snippies</h1>

<div class="snippie-container">
    <ul class="snippie-list">
        {% for snippie in snippies %}
        <li>
            <a href='snippie/{{ snippie.title }}.html'>{{ snippie.title }}</a>
        </li>
        {% endfor %}
    </ul>
</div>

<div class="new-snippie-container">
    <h1>Create new snippie</h1>
    <form action="/new" method="POST">
        <label for="title">Title</label>
        <input type="text" name="title" required />

        <label for="contents">Contents</label>
        <textarea name="contents" rows="4" autocomplete="off" required wrap="soft"></textarea>

        <button type="submit">Save</button>
    </form>
</div>
{% endblock content %}
